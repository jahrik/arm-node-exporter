---
name: Build

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Test building image.
        run: docker build -t test-image .

      - name: Run the image.
        run: |
          docker run -d --name exporter -p 9100:9100 \
            -v /proc:/host/proc:ro -v /sys:/host/sys:ro \
            -v /etc/hostname:/etc/nodename:ro test-image

      - name: Verify metrics and node_meta.
        run: |
          for i in $(seq 1 12); do
            if curl -fsS http://localhost:9100/metrics | grep -q '^node_meta{'; then
              echo "node-exporter is up with node_meta"; exit 0
            fi
            sleep 5
          done
          docker logs exporter
          exit 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image.
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ github.repository }}:latest
