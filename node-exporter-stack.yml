version: '3'

services:

  node:
    image: rycus86/prometheus-node-exporter:armhf
    # command: '--path.procfs /host/proc --path.sysfs /host/sys --collector.filesystem.ignored-mount-points \"^/(sys|proc|dev|host|etc)($$|/)\"'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - 9100:9100
    deploy:
      mode: global
