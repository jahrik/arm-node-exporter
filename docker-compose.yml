---
services:

  node-exporter:
    image: jahrik/arm-node-exporter:latest
    environment:
      - NODE_ID={{.Node.ID}}
    networks:
      - monitor
    volumes:
      - /etc/hostname:/etc/nodename:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    deploy:
      mode: global

networks:
  monitor:
    driver: overlay
    external: true
